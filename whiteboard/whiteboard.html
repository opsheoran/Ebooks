<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Pro Canvas | E-Books Library</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Whiteboard CSS -->
    <link rel="stylesheet" href="whiteboard.css?v=2.0">
    <style>
        body {
            background-color: #F5F3EE;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Source Serif 4', serif;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: #1B2A4A;
        }
        .draw-mode-toggle {
            background: #1B2A4A;
            color: #fff;
            border: 2px solid #C8922A;
            border-radius: 20px;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(27,42,74,.12);
            transition: all 0.3s ease;
        }
        .draw-mode-toggle:hover {
            background: #2E4270;
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(27,42,74,.16);
        }
        /* Make popup full size automatically for standalone page */
        .whiteboard-popup {
            width: 95vw !important;
            height: 95vh !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teacher's Pro Canvas</h1>
        <p>A multi-page digital notebook for mathematical derivations and statistical proofs.</p>
        <br>
        <button class="draw-mode-toggle" id="draw-mode-btn"><i class="fas fa-chalkboard"></i> Open Canvas</button>
        <br><br>
        <a href="../index.html" style="color: #6B6B70; text-decoration: none; font-size: 0.9rem;">&larr; Back to E-Books Library</a>
    </div>

    <!-- Whiteboard JS -->
    <script src="whiteboard.js?v=2.0"></script>
    <script>
        // Auto-click the button so the whiteboard pops up instantly when they visit this page
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('draw-mode-btn').click();
            }, 300);
        };
    </script>
</body>
</html>
